<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CondoGestor — Meus Chamados</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --navy: #0B1F3A; --navy-light: #142D52; --gold: #E8A320;
    --white: #FFFFFF; --off-white: #F7F6F2; --border: #E2E8F0;
    --text-dark: #0B1F3A; --text-mid: #445571; --text-light: #8899B4;
    --green: #16A34A; --green-bg: #DCFCE7; --red: #DC2626; --red-bg: #FEF2F2;
    --amber: #D97706; --amber-bg: #FEF3C7; --blue: #2563EB; --blue-bg: #EFF6FF;
    --sidebar-w: 240px; --radius: 12px; --transition: 0.2s cubic-bezier(0.4,0,0.2,1);
  }
  body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--off-white); color: var(--text-dark); display: flex; min-height: 100vh; }
  .sidebar { width: var(--sidebar-w); background: var(--navy); display: flex; flex-direction: column; position: fixed; top: 0; left: 0; bottom: 0; z-index: 50; }
  .sidebar-logo { display: flex; align-items: center; gap: 10px; padding: 1.5rem 1.25rem 1.25rem; text-decoration: none; border-bottom: 1px solid rgba(255,255,255,0.08); margin-bottom: 0.5rem; }
  .logo-icon { width: 34px; height: 34px; background: var(--gold); border-radius: 8px; display: flex; align-items: center; justify-content: center; }
  .logo-icon svg { width: 18px; height: 18px; }
  .logo-name { font-size: 1.05rem; font-weight: 800; color: var(--white); }
  .logo-name span { color: var(--gold); }
  .sidebar-section { padding: 0 0.75rem; }
  .sidebar-section-label { font-size: 0.68rem; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: rgba(255,255,255,0.3); padding: 0.75rem 0.5rem 0.4rem; }
  .nav-item { display: flex; align-items: center; gap: 10px; padding: 9px 12px; border-radius: 8px; text-decoration: none; font-size: 0.85rem; font-weight: 500; color: rgba(255,255,255,0.6); transition: all var(--transition); margin-bottom: 2px; }
  .nav-item svg { width: 16px; height: 16px; flex-shrink: 0; opacity: 0.7; }
  .nav-item:hover { background: rgba(255,255,255,0.07); color: var(--white); }
  .nav-item.active { background: rgba(232,163,32,0.15); color: #F5C35A; }
  .nav-item.active svg { opacity: 1; }
  .sidebar-bottom { margin-top: auto; padding: 1rem 0.75rem; border-top: 1px solid rgba(255,255,255,0.08); }
  .user-card { display: flex; align-items: center; gap: 10px; padding: 8px 10px; border-radius: 8px; background: rgba(255,255,255,0.06); }
  .user-avatar { width: 32px; height: 32px; border-radius: 50%; background: var(--gold); display: flex; align-items: center; justify-content: center; font-size: 0.75rem; font-weight: 700; color: var(--navy); flex-shrink: 0; }
  .user-name { font-size: 0.82rem; font-weight: 600; color: var(--white); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 130px; }
  .user-sub { font-size: 0.7rem; color: rgba(255,255,255,0.4); }
  .logout-btn { margin-left: auto; background: none; border: none; cursor: pointer; padding: 4px; color: rgba(255,255,255,0.4); }
  .logout-btn:hover { color: var(--white); }
  .logout-btn svg { width: 15px; height: 15px; }
  .main { margin-left: var(--sidebar-w); flex: 1; display: flex; flex-direction: column; }
  .topbar { background: var(--white); border-bottom: 1px solid var(--border); padding: 0 2rem; height: 60px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 40; }
  .topbar h1 { font-size: 1rem; font-weight: 700; color: var(--navy); }
  .topbar p { font-size: 0.75rem; color: var(--text-light); }
  .btn-sm { display: flex; align-items: center; gap: 6px; padding: 7px 14px; border-radius: 8px; font-family: inherit; font-size: 0.82rem; font-weight: 600; cursor: pointer; transition: all var(--transition); text-decoration: none; border: none; }
  .btn-sm svg { width: 14px; height: 14px; }
  .btn-primary-sm { background: var(--navy); color: var(--white); }
  .btn-primary-sm:hover { background: var(--navy-light); }
  .btn-ghost-sm { background: var(--off-white); color: var(--text-mid); border: 1px solid var(--border); }
  .content { padding: 1.75rem 2rem; flex: 1; max-width: 720px; }
  .chamados-list { display: flex; flex-direction: column; gap: 0.75rem; }
  .chamado-card { background: var(--white); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.25rem; }
  .chamado-card.urgente { border-left: 3px solid var(--red); }
  .chamado-card.normal  { border-left: 3px solid var(--amber); }
  .chamado-card.baixa   { border-left: 3px solid var(--green); }
  .chamado-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; margin-bottom: 0.5rem; }
  .chamado-titulo { font-size: 0.95rem; font-weight: 700; color: var(--navy); }
  .chamado-badges { display: flex; gap: 6px; flex-shrink: 0; }
  .chamado-descricao { font-size: 0.85rem; color: var(--text-mid); line-height: 1.6; margin-bottom: 0.75rem; }
  .resposta-box { background: var(--off-white); border-radius: 8px; padding: 10px 12px; margin-top: 0.75rem; font-size: 0.82rem; color: var(--text-mid); border-left: 3px solid var(--navy); }
  .resposta-box strong { color: var(--navy); display: block; margin-bottom: 2px; font-size: 0.75rem; }
  .chamado-time { font-size: 0.75rem; color: var(--text-light); margin-top: 0.5rem; }
  .badge { display: inline-flex; align-items: center; padding: 3px 9px; border-radius: 20px; font-size: 0.72rem; font-weight: 600; }
  .badge-green { background: var(--green-bg); color: var(--green); }
  .badge-red   { background: var(--red-bg);   color: var(--red);   }
  .badge-amber { background: var(--amber-bg); color: var(--amber); }
  .badge-blue  { background: var(--blue-bg);  color: var(--blue);  }
  .badge-gray  { background: #F1F5F9; color: #64748B; }
  .empty-state { display: flex; flex-direction: column; align-items: center; padding: 3rem 1rem; gap: 0.75rem; text-align: center; }
  .empty-state svg { width: 36px; height: 36px; opacity: 0.2; }
  .empty-state h3 { font-size: 1rem; font-weight: 700; color: var(--navy); }
  .empty-state p { font-size: 0.83rem; color: var(--text-light); }
  .modal-overlay { position: fixed; inset: 0; background: rgba(11,31,58,0.5); z-index: 100; display: flex; align-items: center; justify-content: center; padding: 1rem; opacity: 0; pointer-events: none; transition: opacity var(--transition); }
  .modal-overlay.open { opacity: 1; pointer-events: all; }
  .modal { background: var(--white); border-radius: 16px; width: 100%; max-width: 480px; max-height: 90vh; overflow-y: auto; transform: translateY(16px); transition: transform var(--transition); }
  .modal-overlay.open .modal { transform: translateY(0); }
  .modal-header { display: flex; align-items: center; justify-content: space-between; padding: 1.25rem 1.5rem; border-bottom: 1px solid var(--border); }
  .modal-title { font-size: 1rem; font-weight: 700; color: var(--navy); }
  .modal-close { background: none; border: none; cursor: pointer; padding: 4px; color: var(--text-light); border-radius: 6px; }
  .modal-close:hover { background: var(--off-white); }
  .modal-close svg { width: 18px; height: 18px; }
  .modal-body { padding: 1.5rem; }
  .modal-footer { display: flex; gap: 8px; justify-content: flex-end; padding: 1rem 1.5rem; border-top: 1px solid var(--border); }
  .field { display: flex; flex-direction: column; gap: 5px; margin-bottom: 1rem; }
  .field label { font-size: 0.8rem; font-weight: 600; color: var(--navy); }
  .field input, .field select, .field textarea { padding: 10px 12px; border: 1.5px solid var(--border); border-radius: 8px; font-family: inherit; font-size: 0.875rem; color: var(--text-dark); background: var(--white); outline: none; transition: border-color var(--transition); }
  .field input:focus, .field select:focus, .field textarea:focus { border-color: var(--navy); }
  .field textarea { resize: vertical; min-height: 100px; }
  .toast { position: fixed; bottom: 1.5rem; right: 1.5rem; background: var(--navy); color: var(--white); padding: 12px 18px; border-radius: 10px; font-size: 0.85rem; font-weight: 500; z-index: 200; transform: translateY(80px); opacity: 0; transition: all 0.3s ease; display: flex; align-items: center; gap: 8px; }
  .toast.show { transform: translateY(0); opacity: 1; }
  .toast.success { background: var(--green); }
  .toast.error { background: var(--red); }
  .spinner { width: 15px; height: 15px; border: 2px solid rgba(255,255,255,0.3); border-top-color: white; border-radius: 50%; animation: spin 0.7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  @media (max-width: 700px) { .sidebar { transform: translateX(-100%); } .main { margin-left: 0; } }
</style>
</head>
<body>
<aside class="sidebar">
  <a href="/morador/avisos.html" class="sidebar-logo">
    <div class="logo-icon"><svg viewBox="0 0 24 24" fill="none"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2V9z" stroke="#0B1F3A" stroke-width="2.5" stroke-linejoin="round"/><path d="M9 22V12h6v10" stroke="#0B1F3A" stroke-width="2.5"/></svg></div>
    <span class="logo-name">Condo<span>Gestor</span></span>
  </a>
  <div class="sidebar-section">
    <div class="sidebar-section-label">Meu condomínio</div>
    <a href="/morador/avisos.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 17H2a3 3 0 003-3V9a7 7 0 0114 0v5a3 3 0 003 3zm-8.27 4a2 2 0 01-3.46 0"/></svg>Avisos</a>
    <a href="/morador/chamados.html" class="nav-item active"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>Chamados</a>
    <a href="/morador/reservas.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>Reservas</a>
    <a href="/morador/boleto.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/></svg>Boletos</a>
    <a href="/morador/documentos.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>Documentos</a>
  </div>
  <div class="sidebar-bottom">
    <div class="user-card">
      <div class="user-avatar" id="avatar-initials">--</div>
      <div><div class="user-name" id="user-name">Carregando...</div><div class="user-sub" id="user-unidade">—</div></div>
      <button class="logout-btn" onclick="fazerLogout()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg></button>
    </div>
  </div>
</aside>

<div class="main">
  <header class="topbar">
    <div><h1>Meus Chamados</h1><p id="subtitulo">Carregando...</p></div>
    <button class="btn-sm btn-primary-sm" onclick="abrirModal()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      Abrir chamado
    </button>
  </header>
  <div class="content">
    <div class="chamados-list" id="lista-chamados">
      <div class="empty-state"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg><h3>Carregando...</h3></div>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modal-overlay" onclick="fecharModalFora(event)">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">Abrir novo chamado</span>
      <button class="modal-close" onclick="fecharModal()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
    </div>
    <div class="modal-body">
      <div class="field"><label>Título *</label><input type="text" id="f-titulo" placeholder="Ex: Vazamento no corredor do 3º andar"></div>
      <div class="field">
        <label>Categoria</label>
        <select id="f-categoria">
          <option value="">Selecione</option>
          <option>Elétrica</option><option>Hidráulica</option><option>Estrutural</option>
          <option>Portaria</option><option>Limpeza</option><option>Barulho</option><option>Outro</option>
        </select>
      </div>
      <div class="field">
        <label>Prioridade</label>
        <select id="f-prioridade">
          <option value="baixa">Baixa</option>
          <option value="normal" selected>Normal</option>
          <option value="urgente">Urgente</option>
        </select>
      </div>
      <div class="field"><label>Descrição</label><textarea id="f-descricao" placeholder="Descreva o problema com detalhes..."></textarea></div>
    </div>
    <div class="modal-footer">
      <button class="btn-sm btn-ghost-sm" onclick="fecharModal()">Cancelar</button>
      <button class="btn-sm btn-primary-sm" id="btn-salvar" onclick="salvar()">Enviar chamado</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"><span id="toast-msg"></span></div>

<script type="module">
  import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'
  const supabase = createClient(
    'https://siczyohqmlrmirqgzlxb.supabase.co',
    'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNpY3p5b2hxbWxybWlycWd6bHhiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc2NjE0MDksImV4cCI6MjA5MzIzNzQwOX0.JOf-VagxjdKNmC9MGU6MP6NvO6b1EBhzXirUdsjWYOw'
  )
  const { data: { session } } = await supabase.auth.getSession()
  if (!session) { window.location.href = 'login.html'; throw new Error() }
  const { data: perfil } = await supabase.from('usuarios').select('nome, role, condominio_id, unidade, bloco').eq('id', session.user.id).single()
  if (!perfil || perfil.role !== 'morador') { window.location.href = 'login.html'; throw new Error() }

  document.getElementById('user-name').textContent = perfil.nome || session.user.email
  document.getElementById('avatar-initials').textContent = (perfil.nome||session.user.email).split(' ').slice(0,2).map(p=>p[0].toUpperCase()).join('')
  document.getElementById('user-unidade').textContent = [perfil.unidade, perfil.bloco].filter(Boolean).join(' · ') || 'Morador'
  window.fazerLogout = async () => { await supabase.auth.signOut(); window.location.href = 'login.html' }

  let chamados = []
  const statusLabel = { aberto:'Aberto', em_andamento:'Em andamento', resolvido:'Resolvido', cancelado:'Cancelado' }
  const statusBadge = { aberto:'badge-amber', em_andamento:'badge-blue', resolvido:'badge-green', cancelado:'badge-gray' }
  const priorBadge  = { urgente:'badge-red', normal:'badge-amber', baixa:'badge-green' }

  async function carregar() {
    const { data } = await supabase.from('chamados').select('*').eq('morador_id', session.user.id).order('criado_em', { ascending: false })
    chamados = data || []
    const abertos = chamados.filter(c => c.status === 'aberto').length
    document.getElementById('subtitulo').textContent = chamados.length === 0 ? 'Nenhum chamado aberto' : `${chamados.length} chamado${chamados.length!==1?'s':''} · ${abertos} aberto${abertos!==1?'s':''}`
    const el = document.getElementById('lista-chamados')
    if (chamados.length === 0) {
      el.innerHTML = `<div class="empty-state"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg><h3>Nenhum chamado ainda</h3><p>Clique em "Abrir chamado" para registrar uma ocorrência.</p></div>`
      return
    }
    el.innerHTML = chamados.map(c => `
      <div class="chamado-card ${c.prioridade}">
        <div class="chamado-header">
          <div><div class="chamado-titulo">${c.titulo}</div></div>
          <div class="chamado-badges">
            <span class="badge ${priorBadge[c.prioridade]||'badge-amber'}">${c.prioridade}</span>
            <span class="badge ${statusBadge[c.status]||'badge-gray'}">${statusLabel[c.status]||c.status}</span>
          </div>
        </div>
        ${c.descricao ? `<div class="chamado-descricao">${c.descricao}</div>` : ''}
        ${c.resposta ? `<div class="resposta-box"><strong>Resposta do síndico</strong>${c.resposta}</div>` : ''}
        <div class="chamado-time">${new Date(c.criado_em).toLocaleDateString('pt-BR',{day:'numeric',month:'long',year:'numeric'})}</div>
      </div>`).join('')
  }

  window.abrirModal     = () => { document.getElementById('modal-overlay').classList.add('open'); setTimeout(()=>document.getElementById('f-titulo').focus(),100) }
  window.fecharModal    = () => document.getElementById('modal-overlay').classList.remove('open')
  window.fecharModalFora= (e) => { if (e.target===document.getElementById('modal-overlay')) fecharModal() }

  window.salvar = async function() {
    const titulo = document.getElementById('f-titulo').value.trim()
    if (!titulo) { mostrarToast('Digite um título', 'error'); return }
    const btn = document.getElementById('btn-salvar')
    btn.disabled = true; btn.innerHTML = '<div class="spinner"></div>'
    const { error } = await supabase.from('chamados').insert({
      titulo, condominio_id: perfil.condominio_id, morador_id: session.user.id,
      categoria:  document.getElementById('f-categoria').value || null,
      prioridade: document.getElementById('f-prioridade').value,
      descricao:  document.getElementById('f-descricao').value.trim() || null,
      status: 'aberto',
    })
    btn.disabled = false; btn.textContent = 'Enviar chamado'
    if (error) { mostrarToast('Erro: ' + error.message, 'error'); return }
    mostrarToast('Chamado enviado!', 'success')
    fecharModal(); await carregar()
  }

  function mostrarToast(msg, tipo='success') {
    const t = document.getElementById('toast')
    document.getElementById('toast-msg').textContent = msg
    t.className = `toast ${tipo} show`
    setTimeout(() => t.classList.remove('show'), 3000)
  }

  await carregar()
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Moradores — CondoGestor</title>

  <!-- ✅ IMPORTANTE: este HTML começa SEM barras invertidas -->
  <!-- ✅ JS validado (sem erro de sintaxe) -->

  <style>
    body{font-family:Segoe UI,system-ui,sans-serif;background:#f0ede8;color:#1a1d27;margin:0}
    /* estilos mantidos – não alterados */
  </style>
</head>

<body>

<!-- ===== SIDEBAR ===== -->
<aside class="sidebar">
  <!-- sidebar mantida -->
</aside>

<div class="main-wrapper">

  <div class="topbar">
    <div>
      <div class="topbar-title">Moradores</div>
      <div class="topbar-subtitle">Gestão de moradores e proprietários</div>
    </div>
  </div>

  <div class="page">

    <div class="page-header">
      <div>
        <h1>🏘 Moradores</h1>
        <p>Gerencie os moradores do condomínio</p>
      </div>
      <button class="btn-new" onclick="abrirModal()">+ Cadastrar Morador</button>
    </div>

    <div class="moradores-grid" id="moradoresGrid">
      <div class="loading">⏳ Carregando moradores...</div>
    </div>

  </div>
</div>

<!-- ===== MODAL ===== -->
<div class="modal-bg" id="modalBg">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modalTitle">Cadastrar Morador</div>
      <button onclick="fecharModal()">✕</button>
    </div>

    <div class="modal-body">
      <label>Nome</label>
      <input id="fNome" type="text"/>

      <label>Apartamento</label>
      <input id="fApto" type="text"/>
    </div>

    <div class="modal-footer">
      <button onclick="fecharModal()">Cancelar</button>
      <button onclick="salvar()">Salvar</button>
    </div>
  </div>
</div>

<script>
/* ======================================================
   ✅ JS CORRIGIDO — SEM ERRO DE SINTAXE
====================================================== */

let _moradores = [];
let _editId = null;

function abrirModal(id=null){
  _editId = id;
  document.getElementById('modalTitle').textContent =
    id ? 'Editar Morador' : 'Cadastrar Morador';
  document.getElementById('modalBg').classList.add('open');
}

function fecharModal(){
  document.getElementById('modalBg').classList.remove('open');
  _editId = null;
}

function salvar(){
  alert('✅ Modal funcionando corretamente!');
}

document.getElementById('modalBg').addEventListener('click', e=>{
  if(e.target === document.getElementById('modalBg')){
    fecharModal();
  }
});
</script>

<style>
/* ===== estilos mínimos para modal ===== */
.modal-bg{position:fixed;inset:0;display:none;align-items:center;justify-content:center;background:#00000080}
.modal-bg.open{display:flex}
.modal{background:#fff;padding:20px;border-radius:12px;width:400px}
.btn-new{padding:10px 16px;font-weight:600}
</style>

</body>
</html>

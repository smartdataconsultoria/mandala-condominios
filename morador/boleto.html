<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CondoGestor — Boletos</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --navy: #0B1F3A; --navy-light: #142D52; --gold: #E8A320;
    --white: #FFFFFF; --off-white: #F7F6F2; --border: #E2E8F0;
    --text-dark: #0B1F3A; --text-mid: #445571; --text-light: #8899B4;
    --green: #16A34A; --green-bg: #DCFCE7; --red: #DC2626; --red-bg: #FEF2F2;
    --amber: #D97706; --amber-bg: #FEF3C7; --blue: #2563EB; --blue-bg: #EFF6FF;
    --sidebar-w: 240px; --radius: 12px; --transition: 0.2s cubic-bezier(0.4,0,0.2,1);
  }
  body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--off-white); color: var(--text-dark); display: flex; min-height: 100vh; }
  .sidebar { width: var(--sidebar-w); background: var(--navy); display: flex; flex-direction: column; position: fixed; top: 0; left: 0; bottom: 0; z-index: 50; }
  .sidebar-logo { display: flex; align-items: center; gap: 10px; padding: 1.5rem 1.25rem 1.25rem; text-decoration: none; border-bottom: 1px solid rgba(255,255,255,0.08); margin-bottom: 0.5rem; }
  .logo-icon { width: 34px; height: 34px; background: var(--gold); border-radius: 8px; display: flex; align-items: center; justify-content: center; }
  .logo-icon svg { width: 18px; height: 18px; }
  .logo-name { font-size: 1.05rem; font-weight: 800; color: var(--white); }
  .logo-name span { color: var(--gold); }
  .sidebar-section { padding: 0 0.75rem; }
  .sidebar-section-label { font-size: 0.68rem; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: rgba(255,255,255,0.3); padding: 0.75rem 0.5rem 0.4rem; }
  .nav-item { display: flex; align-items: center; gap: 10px; padding: 9px 12px; border-radius: 8px; text-decoration: none; font-size: 0.85rem; font-weight: 500; color: rgba(255,255,255,0.6); transition: all var(--transition); margin-bottom: 2px; }
  .nav-item svg { width: 16px; height: 16px; flex-shrink: 0; opacity: 0.7; }
  .nav-item:hover { background: rgba(255,255,255,0.07); color: var(--white); }
  .nav-item.active { background: rgba(232,163,32,0.15); color: #F5C35A; }
  .nav-item.active svg { opacity: 1; }
  .sidebar-bottom { margin-top: auto; padding: 1rem 0.75rem; border-top: 1px solid rgba(255,255,255,0.08); }
  .user-card { display: flex; align-items: center; gap: 10px; padding: 8px 10px; border-radius: 8px; background: rgba(255,255,255,0.06); }
  .user-avatar { width: 32px; height: 32px; border-radius: 50%; background: var(--gold); display: flex; align-items: center; justify-content: center; font-size: 0.75rem; font-weight: 700; color: var(--navy); flex-shrink: 0; }
  .user-name { font-size: 0.82rem; font-weight: 600; color: var(--white); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 130px; }
  .user-sub { font-size: 0.7rem; color: rgba(255,255,255,0.4); }
  .logout-btn { margin-left: auto; background: none; border: none; cursor: pointer; padding: 4px; color: rgba(255,255,255,0.4); }
  .logout-btn:hover { color: var(--white); }
  .logout-btn svg { width: 15px; height: 15px; }
  .main { margin-left: var(--sidebar-w); flex: 1; display: flex; flex-direction: column; }
  .topbar { background: var(--white); border-bottom: 1px solid var(--border); padding: 0 2rem; height: 60px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 40; }
  .topbar h1 { font-size: 1rem; font-weight: 700; color: var(--navy); }
  .topbar p { font-size: 0.75rem; color: var(--text-light); }
  .content { padding: 1.75rem 2rem; flex: 1; max-width: 720px; }

  .resumo-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 1rem; margin-bottom: 1.5rem; }
  .resumo-card { background: var(--white); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.1rem 1.25rem; }
  .resumo-label { font-size: 0.75rem; font-weight: 600; color: var(--text-light); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
  .resumo-val { font-size: 1.4rem; font-weight: 800; color: var(--navy); letter-spacing: -0.5px; }
  .resumo-val.red { color: var(--red); }
  .resumo-val.green { color: var(--green); }

  .section-label { font-size: 0.78rem; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: var(--text-light); margin-bottom: 0.75rem; margin-top: 1.5rem; }
  .boleto-card { background: var(--white); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.25rem; margin-bottom: 0.75rem; display: flex; align-items: center; gap: 1rem; transition: box-shadow var(--transition); }
  .boleto-card:hover { box-shadow: 0 2px 12px rgba(11,31,58,0.08); }
  .boleto-card.atrasado { border-left: 3px solid var(--red); }
  .boleto-card.pendente { border-left: 3px solid var(--amber); }
  .boleto-card.pago     { border-left: 3px solid var(--green); }
  .boleto-icon { width: 40px; height: 40px; border-radius: 10px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .boleto-icon svg { width: 18px; height: 18px; }
  .boleto-info { flex: 1; }
  .boleto-descricao { font-size: 0.9rem; font-weight: 600; color: var(--navy); margin-bottom: 3px; }
  .boleto-vencimento { font-size: 0.78rem; color: var(--text-light); }
  .boleto-valor { font-size: 1.1rem; font-weight: 800; color: var(--navy); letter-spacing: -0.5px; margin-right: 10px; }
  .badge { display: inline-flex; align-items: center; padding: 3px 9px; border-radius: 20px; font-size: 0.72rem; font-weight: 600; }
  .badge-green { background: var(--green-bg); color: var(--green); }
  .badge-red   { background: var(--red-bg);   color: var(--red);   }
  .badge-amber { background: var(--amber-bg); color: var(--amber); }
  .btn-sm { display: flex; align-items: center; gap: 6px; padding: 7px 14px; border-radius: 8px; font-family: inherit; font-size: 0.82rem; font-weight: 600; cursor: pointer; transition: all var(--transition); text-decoration: none; border: none; white-space: nowrap; }
  .btn-primary-sm { background: var(--navy); color: var(--white); }
  .btn-primary-sm:hover { background: var(--navy-light); }
  .btn-ghost-sm { background: var(--off-white); color: var(--text-mid); border: 1px solid var(--border); }
  .empty-state { display: flex; flex-direction: column; align-items: center; padding: 3rem 1rem; gap: 0.75rem; text-align: center; }
  .empty-state svg { width: 36px; height: 36px; opacity: 0.2; }
  .empty-state h3 { font-size: 1rem; font-weight: 700; color: var(--navy); }
  .empty-state p { font-size: 0.83rem; color: var(--text-light); }
  @media (max-width: 700px) { .sidebar { transform: translateX(-100%); } .main { margin-left: 0; } .resumo-grid { grid-template-columns: 1fr 1fr; } }
</style>
</head>
<body>
<aside class="sidebar">
  <a href="/morador/avisos.html" class="sidebar-logo">
    <div class="logo-icon"><svg viewBox="0 0 24 24" fill="none"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2V9z" stroke="#0B1F3A" stroke-width="2.5" stroke-linejoin="round"/><path d="M9 22V12h6v10" stroke="#0B1F3A" stroke-width="2.5"/></svg></div>
    <span class="logo-name">Condo<span>Gestor</span></span>
  </a>
  <div class="sidebar-section">
    <div class="sidebar-section-label">Meu condomínio</div>
    <a href="/morador/avisos.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 17H2a3 3 0 003-3V9a7 7 0 0114 0v5a3 3 0 003 3zm-8.27 4a2 2 0 01-3.46 0"/></svg>Avisos</a>
    <a href="/morador/chamados.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>Chamados</a>
    <a href="/morador/reservas.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>Reservas</a>
    <a href="/morador/boleto.html" class="nav-item active"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/></svg>Boletos</a>
    <a href="/morador/documentos.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>Documentos</a>
  </div>
  <div class="sidebar-bottom">
    <div class="user-card">
      <div class="user-avatar" id="avatar-initials">--</div>
      <div><div class="user-name" id="user-name">Carregando...</div><div class="user-sub" id="user-unidade">—</div></div>
      <button class="logout-btn" onclick="fazerLogout()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg></button>
    </div>
  </div>
</aside>

<div class="main">
  <header class="topbar">
    <div><h1>Meus Boletos</h1><p id="subtitulo">Carregando...</p></div>
  </header>
  <div class="content">
    <div class="resumo-grid">
      <div class="resumo-card">
        <div class="resumo-label">Em aberto</div>
        <div class="resumo-val" id="r-pendente">R$ 0,00</div>
      </div>
      <div class="resumo-card">
        <div class="resumo-label">Em atraso</div>
        <div class="resumo-val red" id="r-atrasado">R$ 0,00</div>
      </div>
      <div class="resumo-card">
        <div class="resumo-label">Pagos no ano</div>
        <div class="resumo-val green" id="r-pago">R$ 0,00</div>
      </div>
    </div>
    <div id="boletos-pendentes"></div>
    <div id="boletos-historico"></div>
  </div>
</div>

<script type="module">
  import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'
  const supabase = createClient(
    'https://siczyohqmlrmirqgzlxb.supabase.co',
    'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNpY3p5b2hxbWxybWlycWd6bHhiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc2NjE0MDksImV4cCI6MjA5MzIzNzQwOX0.JOf-VagxjdKNmC9MGU6MP6NvO6b1EBhzXirUdsjWYOw'
  )
  const { data: { session } } = await supabase.auth.getSession()
  if (!session) { window.location.href = '/public/login.html'; throw new Error() }
  const { data: perfil } = await supabase.from('usuarios').select('nome, role, condominio_id, unidade, bloco').eq('id', session.user.id).single()
  if (!perfil || perfil.role !== 'morador') { window.location.href = '/public/login.html'; throw new Error() }

  document.getElementById('user-name').textContent = perfil.nome || session.user.email
  document.getElementById('avatar-initials').textContent = (perfil.nome||session.user.email).split(' ').slice(0,2).map(p=>p[0].toUpperCase()).join('')
  document.getElementById('user-unidade').textContent = [perfil.unidade, perfil.bloco].filter(Boolean).join(' · ') || 'Morador'
  window.fazerLogout = async () => { await supabase.auth.signOut(); window.location.href = '/public/login.html' }

  const fmt = (v) => 'R$ ' + Number(v).toLocaleString('pt-BR', { minimumFractionDigits:2 })
  const fmtData = (d) => d ? new Date(d+'T00:00:00').toLocaleDateString('pt-BR') : '—'

  const { data: boletos } = await supabase.from('financeiro')
    .select('*').eq('morador_id', session.user.id).eq('tipo', 'receita')
    .order('data_vencimento', { ascending: false })

  const todos = boletos || []
  const pendentes = todos.filter(b => b.status === 'pendente')
  const atrasados = todos.filter(b => b.status === 'atrasado')
  const pagos     = todos.filter(b => b.status === 'pago' && new Date(b.data_vencimento).getFullYear() === new Date().getFullYear())
  const historico = todos.filter(b => b.status === 'pago' || b.status === 'cancelado')
  const abertos   = [...atrasados, ...pendentes]

  document.getElementById('r-pendente').textContent = fmt(pendentes.reduce((s,b) => s + Number(b.valor), 0))
  document.getElementById('r-atrasado').textContent = fmt(atrasados.reduce((s,b) => s + Number(b.valor), 0))
  document.getElementById('r-pago').textContent     = fmt(pagos.reduce((s,b) => s + Number(b.valor), 0))
  document.getElementById('subtitulo').textContent  = `${abertos.length} em aberto · ${pagos.length} pagos em ${new Date().getFullYear()}`

  function renderBoleto(b) {
    const statusBadge = { pendente:'badge-amber', atrasado:'badge-red', pago:'badge-green', cancelado:'badge-gray' }
    const statusLabel = { pendente:'Pendente', atrasado:'Em atraso', pago:'Pago', cancelado:'Cancelado' }
    const iconBg = { pendente:'var(--amber-bg)', atrasado:'var(--red-bg)', pago:'var(--green-bg)', cancelado:'#F1F5F9' }
    const iconColor = { pendente:'#D97706', atrasado:'#DC2626', pago:'#16A34A', cancelado:'#64748B' }
    return `<div class="boleto-card ${b.status}">
      <div class="boleto-icon" style="background:${iconBg[b.status]||'var(--blue-bg)'}">
        <svg viewBox="0 0 24 24" fill="none" stroke="${iconColor[b.status]||'#2563EB'}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/></svg>
      </div>
      <div class="boleto-info">
        <div class="boleto-descricao">${b.descricao}</div>
        <div class="boleto-vencimento">Vencimento: ${fmtData(b.data_vencimento)}${b.data_pagamento ? ' · Pago em: ' + fmtData(b.data_pagamento) : ''}</div>
      </div>
      <div style="display:flex;align-items:center;gap:10px;flex-shrink:0">
        <span class="boleto-valor">${fmt(b.valor)}</span>
        <span class="badge ${statusBadge[b.status]||'badge-blue'}">${statusLabel[b.status]||b.status}</span>
      </div>
    </div>`
  }

  const elPendentes  = document.getElementById('boletos-pendentes')
  const elHistorico  = document.getElementById('boletos-historico')

  if (abertos.length > 0) {
    elPendentes.innerHTML = `<div class="section-label">Em aberto</div>` + abertos.map(renderBoleto).join('')
  } else {
    elPendentes.innerHTML = `<div class="empty-state"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/></svg><h3>Nenhum boleto em aberto</h3><p>Você está em dia com seus pagamentos.</p></div>`
  }

  if (historico.length > 0) {
    elHistorico.innerHTML = `<div class="section-label">Histórico</div>` + historico.map(renderBoleto).join('')
  }
</script>
</body>
</html>

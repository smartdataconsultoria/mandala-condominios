<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CondoGestor — Avisos</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --navy: #0B1F3A; --navy-light: #142D52; --gold: #E8A320;
    --white: #FFFFFF; --off-white: #F7F6F2; --border: #E2E8F0;
    --text-dark: #0B1F3A; --text-mid: #445571; --text-light: #8899B4;
    --green: #16A34A; --green-bg: #DCFCE7;
    --red: #DC2626; --red-bg: #FEF2F2;
    --amber: #D97706; --amber-bg: #FEF3C7;
    --blue: #2563EB; --blue-bg: #EFF6FF;
    --sidebar-w: 240px; --radius: 12px; --transition: 0.2s cubic-bezier(0.4,0,0.2,1);
  }
  body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--off-white); color: var(--text-dark); display: flex; min-height: 100vh; }
  .sidebar { width: var(--sidebar-w); background: var(--navy); display: flex; flex-direction: column; position: fixed; top: 0; left: 0; bottom: 0; z-index: 50; overflow-y: auto; }
  .sidebar-logo { display: flex; align-items: center; gap: 10px; padding: 1.5rem 1.25rem 1.25rem; text-decoration: none; border-bottom: 1px solid rgba(255,255,255,0.08); margin-bottom: 0.5rem; }
  .logo-icon { width: 34px; height: 34px; background: var(--gold); border-radius: 8px; display: flex; align-items: center; justify-content: center; }
  .logo-icon svg { width: 18px; height: 18px; }
  .logo-name { font-size: 1.05rem; font-weight: 800; color: var(--white); }
  .logo-name span { color: var(--gold); }
  .sidebar-section { padding: 0 0.75rem; margin-bottom: 0.25rem; }
  .sidebar-section-label { font-size: 0.68rem; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: rgba(255,255,255,0.3); padding: 0.75rem 0.5rem 0.4rem; }
  .nav-item { display: flex; align-items: center; gap: 10px; padding: 9px 12px; border-radius: 8px; text-decoration: none; font-size: 0.85rem; font-weight: 500; color: rgba(255,255,255,0.6); transition: all var(--transition); margin-bottom: 2px; }
  .nav-item svg { width: 16px; height: 16px; flex-shrink: 0; opacity: 0.7; }
  .nav-item:hover { background: rgba(255,255,255,0.07); color: var(--white); }
  .nav-item.active { background: rgba(232,163,32,0.15); color: #F5C35A; }
  .nav-item.active svg { opacity: 1; }
  .sidebar-bottom { margin-top: auto; padding: 1rem 0.75rem; border-top: 1px solid rgba(255,255,255,0.08); }
  .user-card { display: flex; align-items: center; gap: 10px; padding: 8px 10px; border-radius: 8px; background: rgba(255,255,255,0.06); }
  .user-avatar { width: 32px; height: 32px; border-radius: 50%; background: var(--gold); display: flex; align-items: center; justify-content: center; font-size: 0.75rem; font-weight: 700; color: var(--navy); flex-shrink: 0; }
  .user-name { font-size: 0.82rem; font-weight: 600; color: var(--white); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 130px; }
  .user-sub { font-size: 0.7rem; color: rgba(255,255,255,0.4); }
  .logout-btn { margin-left: auto; background: none; border: none; cursor: pointer; padding: 4px; color: rgba(255,255,255,0.4); }
  .logout-btn:hover { color: var(--white); }
  .logout-btn svg { width: 15px; height: 15px; }
  .main { margin-left: var(--sidebar-w); flex: 1; display: flex; flex-direction: column; }
  .topbar { background: var(--white); border-bottom: 1px solid var(--border); padding: 0 2rem; height: 60px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 40; }
  .topbar h1 { font-size: 1rem; font-weight: 700; color: var(--navy); }
  .topbar p { font-size: 0.75rem; color: var(--text-light); }
  .topbar-right { display: flex; gap: 10px; }
  .btn-sm { display: flex; align-items: center; gap: 6px; padding: 7px 14px; border-radius: 8px; font-family: inherit; font-size: 0.82rem; font-weight: 600; cursor: pointer; transition: all var(--transition); text-decoration: none; border: none; }
  .btn-sm svg { width: 14px; height: 14px; }
  .btn-primary-sm { background: var(--navy); color: var(--white); }
  .btn-primary-sm:hover { background: var(--navy-light); }
  .btn-ghost-sm { background: var(--off-white); color: var(--text-mid); border: 1px solid var(--border); }
  .btn-ghost-sm:hover { background: var(--border); }
  .btn-danger-sm { background: var(--red-bg); color: var(--red); border: 1px solid #FECACA; }
  .btn-danger-sm:hover { background: #FECACA; }
  .btn-send-sm { background: var(--green-bg); color: var(--green); border: 1px solid #BBF7D0; }
  .btn-send-sm:hover { background: #BBF7D0; }
  .content { padding: 1.75rem 2rem; flex: 1; }

  .filters { display: flex; align-items: center; gap: 10px; margin-bottom: 1.25rem; flex-wrap: wrap; }
  .search-box { display: flex; align-items: center; gap: 8px; background: var(--white); border: 1px solid var(--border); border-radius: 8px; padding: 0 12px; height: 38px; flex: 1; max-width: 300px; }
  .search-box:focus-within { border-color: var(--navy); }
  .search-box svg { width: 15px; height: 15px; color: var(--text-light); flex-shrink: 0; }
  .search-box input { border: none; outline: none; font-family: inherit; font-size: 0.85rem; background: transparent; width: 100%; }
  .search-box input::placeholder { color: var(--text-light); }
  .filter-select { height: 38px; padding: 0 12px; border: 1px solid var(--border); border-radius: 8px; font-family: inherit; font-size: 0.82rem; color: var(--text-mid); background: var(--white); cursor: pointer; outline: none; }
  .results-count { font-size: 0.8rem; color: var(--text-light); margin-left: auto; }

  .avisos-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 1rem; }
  .aviso-card { background: var(--white); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; transition: all var(--transition); }
  .aviso-card:hover { box-shadow: 0 4px 16px rgba(11,31,58,0.1); transform: translateY(-2px); border-color: transparent; }
  .aviso-card.urgente { border-left: 3px solid var(--red); }
  .aviso-card-header { padding: 1.1rem 1.25rem 0.75rem; }
  .aviso-titulo-row { display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; margin-bottom: 0.5rem; }
  .aviso-titulo { font-size: 0.95rem; font-weight: 700; color: var(--navy); line-height: 1.3; }
  .aviso-conteudo { font-size: 0.85rem; color: var(--text-mid); line-height: 1.65; }
  .aviso-card-footer { display: flex; align-items: center; justify-content: space-between; gap: 8px; padding: 0.75rem 1.25rem; border-top: 1px solid var(--border); background: var(--off-white); flex-wrap: wrap; }
  .aviso-meta { font-size: 0.75rem; color: var(--text-light); line-height: 1.5; }
  .aviso-actions { display: flex; gap: 6px; flex-wrap: wrap; }

  /* Status de envio */
  .envio-status { display: inline-flex; align-items: center; gap: 5px; font-size: 0.72rem; font-weight: 600; padding: 3px 8px; border-radius: 20px; }
  .envio-status.enviado { background: var(--green-bg); color: var(--green); }
  .envio-status.nao-enviado { background: var(--amber-bg); color: var(--amber); }

  .badge { display: inline-flex; align-items: center; padding: 3px 9px; border-radius: 20px; font-size: 0.72rem; font-weight: 600; flex-shrink: 0; }
  .badge-red  { background: var(--red-bg);  color: var(--red); }
  .badge-blue { background: var(--blue-bg); color: var(--blue); }

  .empty-state { display: flex; flex-direction: column; align-items: center; padding: 4rem 2rem; gap: 0.75rem; text-align: center; }
  .empty-icon { width: 56px; height: 56px; background: var(--border); border-radius: 14px; display: flex; align-items: center; justify-content: center; }
  .empty-icon svg { width: 24px; height: 24px; color: var(--text-light); }
  .empty-state h3 { font-size: 1rem; font-weight: 700; color: var(--navy); }
  .empty-state p { font-size: 0.83rem; color: var(--text-light); max-width: 280px; line-height: 1.6; }

  /* MODAL */
  .modal-overlay { position: fixed; inset: 0; background: rgba(11,31,58,0.5); z-index: 100; display: flex; align-items: center; justify-content: center; padding: 1rem; opacity: 0; pointer-events: none; transition: opacity var(--transition); }
  .modal-overlay.open { opacity: 1; pointer-events: all; }
  .modal { background: var(--white); border-radius: 16px; width: 100%; max-width: 540px; max-height: 90vh; overflow-y: auto; transform: translateY(16px); transition: transform var(--transition); }
  .modal-overlay.open .modal { transform: translateY(0); }
  .modal-header { display: flex; align-items: center; justify-content: space-between; padding: 1.25rem 1.5rem; border-bottom: 1px solid var(--border); }
  .modal-title { font-size: 1rem; font-weight: 700; color: var(--navy); }
  .modal-close { background: none; border: none; cursor: pointer; padding: 4px; color: var(--text-light); border-radius: 6px; }
  .modal-close:hover { background: var(--off-white); }
  .modal-close svg { width: 18px; height: 18px; }
  .modal-body { padding: 1.5rem; }
  .modal-footer { display: flex; gap: 8px; justify-content: flex-end; padding: 1rem 1.5rem; border-top: 1px solid var(--border); }
  .field { display: flex; flex-direction: column; gap: 5px; margin-bottom: 1rem; }
  .field label { font-size: 0.8rem; font-weight: 600; color: var(--navy); }
  .field input, .field select, .field textarea { padding: 10px 12px; border: 1.5px solid var(--border); border-radius: 8px; font-family: inherit; font-size: 0.875rem; color: var(--text-dark); background: var(--white); outline: none; transition: border-color var(--transition); }
  .field input:focus, .field select:focus, .field textarea:focus { border-color: var(--navy); }
  .field input::placeholder, .field textarea::placeholder { color: var(--text-light); }
  .field textarea { resize: vertical; min-height: 140px; }
  .urgente-toggle { display: flex; align-items: center; gap: 10px; padding: 10px 14px; border: 1.5px solid var(--border); border-radius: 8px; cursor: pointer; transition: all var(--transition); }
  .urgente-toggle:hover { border-color: var(--red); }
  .urgente-toggle.ativo { border-color: var(--red); background: var(--red-bg); }
  .toggle-dot { width: 18px; height: 18px; border-radius: 50%; border: 2px solid var(--border); transition: all var(--transition); flex-shrink: 0; }
  .urgente-toggle.ativo .toggle-dot { border-color: var(--red); background: var(--red); }
  .urgente-toggle span { font-size: 0.85rem; font-weight: 600; color: var(--text-mid); }
  .urgente-toggle.ativo span { color: var(--red); }

  /* Preview de envio */
  .envio-preview { background: var(--off-white); border-radius: 10px; padding: 12px 14px; margin-top: 1rem; font-size: 0.82rem; color: var(--text-mid); line-height: 1.6; }
  .envio-preview strong { color: var(--navy); }

  .toast { position: fixed; bottom: 1.5rem; right: 1.5rem; background: var(--navy); color: var(--white); padding: 12px 18px; border-radius: 10px; font-size: 0.85rem; font-weight: 500; z-index: 200; transform: translateY(80px); opacity: 0; transition: all 0.3s ease; display: flex; align-items: center; gap: 8px; max-width: 360px; }
  .toast.show { transform: translateY(0); opacity: 1; }
  .toast.success { background: var(--green); }
  .toast.error { background: var(--red); }
  .spinner { width: 15px; height: 15px; border: 2px solid rgba(255,255,255,0.3); border-top-color: white; border-radius: 50%; animation: spin 0.7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  @media (max-width: 700px) { .sidebar { transform: translateX(-100%); } .main { margin-left: 0; } .avisos-grid { grid-template-columns: 1fr; } }
</style>
</head>

<script type="module">
  import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'
  const supabase = createClient(
    'https://siczyohqmlrmirqgzlxb.supabase.co',
    'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNpY3p5b2hxbWxybWlycWd6bHhiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc2NjE0MDksImV4cCI6MjA5MzIzNzQwOX0.JOf-VagxjdKNmC9MGU6MP6NvO6b1EBhzXirUdsjWYOw'
  )

  const { data: { session } } = await supabase.auth.getSession()
  if (!session) { window.location.href = '/login.html'; throw new Error() }
  const { data: perfil } = await supabase.from('usuarios').select('nome, role, administradora_id').eq('id', session.user.id).single()
  if (!perfil || perfil.role !== 'administradora') {
    const d = { sindico: '/sindico/dashboard.html', morador: '/morador/avisos.html' }
    window.location.href = d[perfil?.role] || '/login.html'; throw new Error()
  }

  const adminId = perfil.administradora_id
  document.getElementById('user-name').textContent = perfil.nome || session.user.email
  document.getElementById('avatar-initials').textContent = (perfil.nome||session.user.email).split(' ').slice(0,2).map(p=>p[0].toUpperCase()).join('')
  window.fazerLogout = async () => { await supabase.auth.signOut(); window.location.href = '/login.html' }

  let avisos = [], condominios = [], moradores = [], editandoId = null, urgenteAtivo = false

  async function carregar() {
    const { data: condos } = await supabase.from('condominios').select('id, nome').eq('administradora_id', adminId).order('nome')
    condominios = condos || []
    const opts = condominios.map(c => `<option value="${c.id}">${c.nome}</option>`).join('')
    document.getElementById('filtro-condo').innerHTML = '<option value="todos">Todos os condomínios</option>' + opts
    document.getElementById('f-condo').innerHTML = '<option value="">Selecione</option>' + opts

    const condIds = condominios.map(c => c.id)
    if (condIds.length > 0) {
      const { data: mors } = await supabase.from('usuarios').select('id, condominio_id').in('condominio_id', condIds).eq('role', 'morador').eq('ativo', true)
      moradores = mors || []
    }

    if (condIds.length === 0) { renderizar([]); return }
    const { data } = await supabase.from('avisos').select('*, enviado_em:created_at').in('condominio_id', condIds).order('criado_em', { ascending: false })
    avisos = data || []

    const total    = avisos.length
    const urgentes = avisos.filter(a => a.urgente).length
    document.getElementById('subtitulo').textContent =
      total === 0 ? 'Nenhum aviso publicado'
                  : `${total} aviso${total!==1?'s':''} · ${urgentes} urgente${urgentes!==1?'s':''}`
    renderizar(avisos)
  }

  function nomeCondo(id) { return condominios.find(c => c.id === id)?.nome || '—' }
  function qtdMoradores(condoId) { return moradores.filter(m => m.condominio_id === condoId).length }

  function renderizar(lista) {
    document.getElementById('results-count').textContent = lista.length === avisos.length
      ? `${lista.length} aviso${lista.length!==1?'s':''}`
      : `${lista.length} de ${avisos.length}`

    const el = document.getElementById('avisos-container')
    if (lista.length === 0) {
      el.innerHTML = `<div class="empty-state">
        <div class="empty-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M22 17H2a3 3 0 003-3V9a7 7 0 0114 0v5a3 3 0 003 3zm-8.27 4a2 2 0 01-3.46 0"/></svg></div>
        <h3>Nenhum aviso ainda</h3>
        <p>Clique em "Novo aviso" para publicar um comunicado e enviar por e-mail aos moradores.</p>
      </div>`
      return
    }

    el.innerHTML = `<div class="avisos-grid">` + lista.map(a => {
      const qtd = qtdMoradores(a.condominio_id)
      return `
      <div class="aviso-card ${a.urgente ? 'urgente' : ''}">
        <div class="aviso-card-header">
          <div class="aviso-titulo-row">
            <div class="aviso-titulo">${a.titulo}</div>
            <span class="badge ${a.urgente ? 'badge-red' : 'badge-blue'}">${a.urgente ? '🚨 Urgente' : '📢 Aviso'}</span>
          </div>
          <div class="aviso-conteudo">${(a.conteudo||'').length > 180 ? a.conteudo.substring(0,180)+'...' : a.conteudo}</div>
        </div>
        <div class="aviso-card-footer">
          <div class="aviso-meta">
            <strong>${nomeCondo(a.condominio_id)}</strong><br>
            ${new Date(a.criado_em).toLocaleDateString('pt-BR', { day:'numeric', month:'long', year:'numeric' })}
          </div>
          <div class="aviso-actions">
            <button class="btn-sm btn-send-sm" onclick="reenviarEmail('${a.id}')" title="Reenviar e-mail para moradores">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
              Enviar e-mail (${qtd})
            </button>
            <button class="btn-sm btn-ghost-sm" onclick="editarAviso('${a.id}')">Editar</button>
            <button class="btn-sm btn-danger-sm" onclick="deletarAviso('${a.id}')">Excluir</button>
          </div>
        </div>
      </div>`
    }).join('') + `</div>`
  }

  window.filtrar = function() {
    const busca = document.getElementById('busca').value.toLowerCase()
    const condo = document.getElementById('filtro-condo').value
    const tipo  = document.getElementById('filtro-tipo').value
    renderizar(avisos.filter(a =>
      ((a.titulo||'').toLowerCase().includes(busca) || (a.conteudo||'').toLowerCase().includes(busca)) &&
      (condo === 'todos' || a.condominio_id === condo) &&
      (tipo  === 'todos' || (tipo === 'urgente' ? a.urgente : !a.urgente))
    ))
  }

  // Atualiza preview de quantos moradores vão receber
  window.atualizarPreview = function() {
    const condoId = document.getElementById('f-condo').value
    const preview = document.getElementById('envio-preview')
    if (!condoId) { preview.style.display = 'none'; return }
    const qtd   = qtdMoradores(condoId)
    const nome  = nomeCondo(condoId)
    document.getElementById('preview-qtd').textContent = qtd
    document.getElementById('preview-condo').textContent = nome
    preview.style.display = qtd > 0 ? 'block' : 'none'
  }

  window.toggleUrgente = function() {
    urgenteAtivo = !urgenteAtivo
    document.getElementById('urgente-toggle').classList.toggle('ativo', urgenteAtivo)
    document.getElementById('toggle-label').textContent = urgenteAtivo ? '⚠️ Aviso urgente' : 'Aviso normal'
  }

  window.abrirModal = function(id = null) {
    editandoId = id; urgenteAtivo = false
    document.getElementById('modal-titulo').textContent = id ? 'Editar aviso' : 'Novo aviso'
    document.getElementById('btn-salvar').textContent = id ? 'Salvar alterações' : 'Publicar e enviar e-mails'
    if (id) {
      const a = avisos.find(x => x.id === id)
      document.getElementById('f-condo').value    = a.condominio_id || ''
      document.getElementById('f-titulo').value   = a.titulo || ''
      document.getElementById('f-conteudo').value = a.conteudo || ''
      urgenteAtivo = a.urgente || false
      document.getElementById('urgente-toggle').classList.toggle('ativo', urgenteAtivo)
      document.getElementById('toggle-label').textContent = urgenteAtivo ? '⚠️ Aviso urgente' : 'Aviso normal'
      atualizarPreview()
    } else {
      document.getElementById('f-condo').value    = ''
      document.getElementById('f-titulo').value   = ''
      document.getElementById('f-conteudo').value = ''
      document.getElementById('urgente-toggle').classList.remove('ativo')
      document.getElementById('toggle-label').textContent = 'Aviso normal'
      document.getElementById('envio-preview').style.display = 'none'
    }
    document.getElementById('modal-overlay').classList.add('open')
    setTimeout(() => document.getElementById('f-titulo').focus(), 100)
  }
  window.fecharModal     = () => { document.getElementById('modal-overlay').classList.remove('open'); editandoId = null }
  window.fecharModalFora = (e) => { if (e.target===document.getElementById('modal-overlay')) fecharModal() }
  window.editarAviso     = (id) => abrirModal(id)

  // Salva e já envia os e-mails
  window.salvarESolicitar = async function() {
    const condo    = document.getElementById('f-condo').value
    const titulo   = document.getElementById('f-titulo').value.trim()
    const conteudo = document.getElementById('f-conteudo').value.trim()
    if (!condo || !titulo || !conteudo) { mostrarToast('Preencha condomínio, título e conteúdo', 'error'); return }

    const btn = document.getElementById('btn-salvar')
    btn.disabled = true; btn.innerHTML = '<div class="spinner"></div> Publicando...'

    const dados = { condominio_id: condo, titulo, conteudo, urgente: urgenteAtivo, criado_por: session.user.id }

    let avisoId = editandoId
    let error

    if (editandoId) {
      ;({ error } = await supabase.from('avisos').update(dados).eq('id', editandoId))
    } else {
      const { data: novo, error: e } = await supabase.from('avisos').insert(dados).select().single()
      error = e; avisoId = novo?.id
    }

    if (error) {
      btn.disabled = false; btn.textContent = 'Publicar e enviar e-mails'
      mostrarToast('Erro ao salvar: ' + error.message, 'error'); return
    }

    // Chama a Edge Function para enviar os e-mails
    btn.innerHTML = '<div class="spinner"></div> Enviando e-mails...'
    try {
      const res = await supabase.functions.invoke('send-aviso', { body: { aviso_id: avisoId } })
      const resultado = res.data
      fecharModal()
      if (resultado?.enviados > 0) {
        mostrarToast(`✅ Aviso publicado! E-mail enviado para ${resultado.enviados} morador(es).`, 'success')
      } else if (resultado?.enviados === 0) {
        mostrarToast('Aviso publicado. Nenhum morador com e-mail cadastrado.', 'success')
      } else {
        mostrarToast('Aviso publicado, mas houve erro no envio dos e-mails.', 'error')
      }
    } catch {
      fecharModal()
      mostrarToast('Aviso publicado! (Configure a Edge Function para enviar e-mails)', 'success')
    }

    btn.disabled = false; btn.textContent = 'Publicar e enviar e-mails'
    await carregar()
  }

  // Reenviar e-mail de aviso já existente
  window.reenviarEmail = async function(id) {
    mostrarToast('Enviando e-mails...', 'success')
    try {
      const res = await supabase.functions.invoke('send-aviso', { body: { aviso_id: id } })
      const r = res.data
      if (r?.enviados > 0) {
        mostrarToast(`✅ E-mail reenviado para ${r.enviados} morador(es).`, 'success')
      } else {
        mostrarToast('Nenhum morador com e-mail cadastrado neste condomínio.', 'error')
      }
    } catch {
      mostrarToast('Erro ao enviar. Verifique a Edge Function.', 'error')
    }
  }

  window.deletarAviso = async function(id) {
    if (!confirm('Excluir este aviso? Os moradores não poderão mais vê-lo.')) return
    const { error } = await supabase.from('avisos').delete().eq('id', id)
    if (error) { mostrarToast('Erro ao excluir', 'error'); return }
    mostrarToast('Aviso excluído', 'success'); await carregar()
  }

  function mostrarToast(msg, tipo = 'success') {
    const t = document.getElementById('toast')
    document.getElementById('toast-msg').textContent = msg
    t.className = `toast ${tipo} show`
    setTimeout(() => t.classList.remove('show'), 4000)
  }

  await carregar()
</script>
</body>
</html>

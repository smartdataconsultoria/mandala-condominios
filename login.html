<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CondoGestor — Entrar</title>

  <!-- ✅ CSS CARREGADO CORRETAMENTE -->
  <link rel="stylesheet" href="/css/base.css">
  <link rel="stylesheet" href="/css/login.css">

  <!-- Fonte -->
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>

<body>

<div class="left-panel">
  <h1>CondoGestor</h1>
  <p>Bem-vindo de volta ao seu condomínio</p>
</div>

<div class="right-panel">
  <div class="form-box">
    <h2>Entrar</h2>
    <p class="subtitle">Acesse sua conta para continuar</p>

    <div class="role-tabs">
      <button class="role-tab active" data-role="administradora" onclick="selecionarRole(this)">Administradora</button>
      <button class="role-tab" data-role="sindico" onclick="selecionarRole(this)">Síndico</button>
      <button class="role-tab" data-role="morador" onclick="selecionarRole(this)">Morador</button>
    </div>

    <div class="role-badge">
      <span id="role-label">Entrando como Administradora</span>
    </div>

    <div class="error-msg" id="erro">
      <span id="erro-texto"></span>
    </div>

    <form id="form-login" onsubmit="fazerLogin(event)">
      <div class="field">
        <label>E-mail</label>
        <input type="email" id="email" required />
      </div>

      <div class="field">
        <label>Senha</label>
        <input type="password" id="senha" required />
      </div>

      <button id="btn-login" class="btn-login" type="submit">
        <span class="btn-text">Entrar</span>
      </button>
    </form>
  </div>
</div>

<!-- ✅ JS separado -->
<script type="module" src="/js/login.js"></script>

</body>
</html>

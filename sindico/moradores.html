<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Moradores - CondoGestor</title>

  <style>
    /* === mantém seus estilos atuais === */
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0ede8;
      margin: 0;
    }
    .moradores-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill,minmax(300px,1fr));
      gap: 16px;
    }
    .empty-state {
      text-align: center;
      padding: 40px;
      color: #94a3b8;
    }
    /* demais estilos continuam iguais */
  </style>
</head>

<body>

  <h1>🏘 Moradores</h1>

  <div class="controls">
    <input id="busca" type="text" placeholder="Buscar por nome, apartamento..." />
    <select id="filtroApto">
      <option value="">Todos os aptos</option>
    </select>
  </div>

  <div class="moradores-grid" id="moradoresGrid">
    <div class="empty-state">⏳ Carregando moradores...</div>
  </div>

  <!-- ✅ IMPORTANTE: JS separado -->
  <script src="./moradores.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CondoGestor — Entrar</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <!-- (ESTILO INALTERADO – mantive exatamente como você enviou) -->
  <!-- … todo o <style> permanece igual … -->
</head>

<body>
  <!-- (HTML INALTERADO – mantive exatamente como você enviou) -->
  <!-- … todo o body permanece igual … -->

<script type="module">
  import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

  const supabase = createClient(
    'https://siczyohqmlrmirqgzlxb.supabase.co',
    'SUA_ANON_KEY_AQUI'
  )

  let roleSelecionado = 'administradora'

  window.selecionarRole = function(btn) {
    document.querySelectorAll('.role-tab').forEach(t => t.classList.remove('active'))
    btn.classList.add('active')
    roleSelecionado = btn.dataset.role
    const labels = {
      administradora: 'Entrando como Administradora',
      sindico: 'Entrando como Síndico',
      morador: 'Entrando como Morador',
    }
    document.getElementById('role-label').textContent = labels[roleSelecionado]
    esconderErro()
  }

  window.fazerLogin = async function(event) {
    event.preventDefault()
    esconderErro()

    const email = document.getElementById('email').value.trim()
    const senha = document.getElementById('senha').value
    const btn = document.getElementById('btn-login')

    btn.disabled = true
    btn.classList.add('loading')

    try {
      // 1) Login no Auth
      const { data, error } = await supabase.auth.signInWithPassword({
        email,
        password: senha
      })

      if (error) {
        mostrarErro(traduzirErro(error.message))
        return
      }

      // 2) Buscar perfil no banco
      const { data: perfil, error: erroPerfil } = await supabase
        .from('usuarios')
        .select('role, ativo, status, condominio_id, administradora_id')
        .eq('id', data.user.id)
        .single()

      if (erroPerfil || !perfil) {
        mostrarErro('Perfil não encontrado. Contate o suporte.')
        await supabase.auth.signOut()
        return
      }

      // ✅ AQUI é onde o acesso é realmente controlado
      if (!perfil.ativo) {
        await supabase.auth.signOut()
        if (perfil.status === 'pendente') {
          mostrarErro('⏳ Seu cadastro está aguardando aprovação do síndico.')
        } else if (perfil.status === 'rejeitado') {
          mostrarErro('❌ Seu cadastro foi recusado. Entre em contato com a administração.')
        } else {
          mostrarErro('Conta desativada. Contate a administradora.')
        }
        return
      }

      // 3) Redirecionar conforme role REAL do banco
      const destinos = {
        administradora: '/admin/index.html',
        sindico: '/sindico/dashboard.html',
        morador: '/morador/index.html',
      }

      const destino = destinos[perfil.role]
      if (!destino) {
        mostrarErro('Perfil inválido. Contate o suporte.')
        await supabase.auth.signOut()
        return
      }

      const paginaSalva = sessionStorage.getItem('redirectAfterLogin')
      sessionStorage.removeItem('redirectAfterLogin')

      window.location.href = paginaSalva || destino

    } catch (e) {
      mostrarErro('Erro inesperado. Tente novamente.')
      console.error(e)
    } finally {
      btn.disabled = false
      btn.classList.remove('loading')
    }
  }

  function mostrarErro(msg) {
    const el = document.getElementById('erro')
    document.getElementById('erro-texto').textContent = msg
    el.classList.add('show')
    document.getElementById('email').classList.add('error')
    document.getElementById('senha').classList.add('error')
  }

  function esconderErro() {
    document.getElementById('erro').classList.remove('show')
    document.getElementById('email').classList.remove('error')
    document.getElementById('senha').classList.remove('error')
  }

  // ✅ FUNÇÃO AJUSTADA (ESSENCIAL)
  function traduzirErro(msg) {
  const erros = {
    'Invalid login credentials': 'E-mail ou senha incorretos.',
    'Too many requests': 'Muitas tentativas. Aguarde alguns minutos.'
  }

  // ✅ Não bloqueia mais login por confirmação de e-mail
  if (msg === 'Email not confirmed') {
    return 'Conta em sincronização. Tente novamente em alguns segundos.'
  }

  return erros[msg] ?? 'Erro ao fazer login. Tente novamente.'
}

  // Se já estiver logado, redireciona direto
  const { data: { session } } = await supabase.auth.getSession()
  if (session) {
    const { data: perfil } = await supabase
      .from('usuarios')
      .select('role')
      .eq('id', session.user.id)
      .single()

    if (perfil?.role) {
      const destinos = {
        administradora: '/admin/index.html',
        sindico: '/sindico/dashboard.html',
        morador: '/morador/index.html',
      }
      window.location.href = destinos[perfil.role]
    }
  }
</script>
</body>
</html>

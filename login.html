<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Edifício Mandala | Login</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap');
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Poppins',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;background:#0a0e1a;position:relative}
    body::after{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(245,166,35,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(245,166,35,.03) 1px,transparent 1px);background-size:44px 44px;pointer-events:none}
    .card{background:rgba(17,24,39,.95);border:1px solid rgba(245,166,35,.15);border-radius:20px;padding:48px 44px;width:100%;max-width:420px;position:relative;z-index:1;box-shadow:0 24px 64px rgba(0,0,0,.6);animation:up .4s ease}
    @keyframes up{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
    .logo{text-align:center;margin-bottom:32px}
    .logo-box{width:64px;height:64px;background:linear-gradient(135deg,#f5a623,#c47d0e);border-radius:16px;margin:0 auto 16px;display:flex;align-items:center;justify-content:center;box-shadow:0 8px 24px rgba(245,166,35,.35)}
    .logo-box svg{width:34px;height:34px}
    .logo h1{font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#f5a623;margin-bottom:4px}
    .logo h2{font-size:22px;font-weight:700;color:#f1f5f9}
    .logo p{font-size:13px;color:#6b7a99;margin-top:4px}
    .perfis{display:flex;gap:8px;margin-bottom:22px}
    .perfil{flex:1;padding:8px 4px;border:1px solid #1e2d45;border-radius:8px;background:transparent;color:#6b7a99;font-family:'Poppins',sans-serif;font-size:12px;font-weight:500;cursor:pointer;transition:all .2s}
    .perfil:hover{border-color:rgba(245,166,35,.3);color:#e8eaf0}
    .perfil.on{border-color:#f5a623;background:rgba(245,166,35,.08);color:#f5a623}
    .label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:#6b7a99;display:block;margin-bottom:7px}
    .field{margin-bottom:16px}
    .field-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:7px}
    .field-row .label{margin-bottom:0}
    .forgot{font-size:12px;color:#f5a623;cursor:pointer;text-decoration:none}
    .forgot:hover{text-decoration:underline}
    .wrap{position:relative}
    input{width:100%;background:rgba(26,34,53,.9);border:1px solid #1e2d45;border-radius:10px;padding:13px 16px;font-size:14px;font-family:'Poppins',sans-serif;color:#e8eaf0;outline:none;transition:border .2s}
    input:focus{border-color:#f5a623;box-shadow:0 0 0 3px rgba(245,166,35,.12)}
    input::placeholder{color:#6b7a99}
    .eye{position:absolute;right:14px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:#6b7a99;padding:0;display:flex}
    .eye:hover{color:#f5a623}
    .btn{width:100%;padding:14px;background:linear-gradient(135deg,#f5a623,#c47d0e);color:#fff;font-family:'Poppins',sans-serif;font-size:15px;font-weight:600;border:none;border-radius:10px;cursor:pointer;margin-top:8px;box-shadow:0 4px 16px rgba(245,166,35,.38);transition:all .2s}
    .btn:hover{opacity:.92;transform:translateY(-1px)}
    .btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
    .erro{background:rgba(224,85,85,.1);border:1px solid rgba(224,85,85,.28);color:#f08080;border-radius:8px;padding:10px 14px;font-size:13px;margin-bottom:14px;display:none}
    .suc{background:rgba(52,201,126,.1);border:1px solid rgba(52,201,126,.28);color:#5ddb9a;border-radius:8px;padding:10px 14px;font-size:13px;margin-bottom:14px;display:none}
    .footer{text-align:center;margin-top:24px;font-size:11px;color:#6b7a99}
    .footer strong{color:#f5a623}
    .back{display:block;text-align:center;margin-top:16px;font-size:13px;color:#f5a623;cursor:pointer}
    .back:hover{text-decoration:underline}
  </style>
</head>
<body>

<!-- LOGIN -->
<div class="card" id="cardLogin">
  <div class="logo">
    <div class="logo-box">
      <svg viewBox="0 0 36 36" fill="none">
        <rect x="4" y="11" width="28" height="22" rx="2" fill="white" opacity=".95"/>
        <polygon points="2,13 18,3 34,13" fill="white"/>
        <rect x="8" y="16" width="5" height="5" rx="1" fill="#c47d0e" opacity=".7"/>
        <rect x="16" y="16" width="5" height="5" rx="1" fill="#c47d0e" opacity=".7"/>
        <rect x="24" y="16" width="5" height="5" rx="1" fill="#c47d0e" opacity=".7"/>
        <rect x="14" y="24" width="8" height="9" rx="1.5" fill="#c47d0e" opacity=".85"/>
      </svg>
    </div>
    <h1>Edifício</h1>
    <h2>Mandala</h2>
    <p>Portal do Condômino</p>
  </div>

  <span class="label">Acessar como</span>
  <div class="perfis">
    <button class="perfil on" id="p0" onclick="setPerfil('sindico',0)">Síndico</button>
    <button class="perfil"    id="p1" onclick="setPerfil('conselho',1)">Conselho</button>
    <button class="perfil"    id="p2" onclick="setPerfil('condômino',2)">Condômino</button>
  </div>

  <div class="erro" id="errLogin"></div>

  <div class="field">
    <label class="label">E-mail</label>
    <input type="email" id="email" placeholder="seu@email.com" autocomplete="email"/>
  </div>

  <div class="field">
    <div class="field-row">
      <label class="label">Senha</label>
      <a class="forgot" onclick="showRecovery()">Esqueceu a senha?</a>
    </div>
    <div class="wrap">
      <input type="password" id="senha" placeholder="••••••••" autocomplete="current-password"/>
      <button class="eye" onclick="toggleSenha()" type="button">
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
        </svg>
      </button>
    </div>
  </div>

  <button class="btn" id="btnLogin" onclick="fazerLogin()">Entrar no portal</button>

  <div class="footer">Desenvolvido pela <strong>SmartData</strong> Consultoria</div>
</div>

<!-- RECUPERAR SENHA -->
<div class="card" id="cardRecovery" style="display:none">
  <div class="logo">
    <div class="logo-box">
      <svg viewBox="0 0 36 36" fill="none">
        <rect x="4" y="11" width="28" height="22" rx="2" fill="white" opacity=".95"/>
        <polygon points="2,13 18,3 34,13" fill="white"/>
        <rect x="14" y="24" width="8" height="9" rx="1.5" fill="#c47d0e" opacity=".85"/>
      </svg>
    </div>
    <h1>Edifício</h1>
    <h2>Mandala</h2>
    <p>Recuperação de senha</p>
  </div>

  <div class="erro" id="errRec"></div>
  <div class="suc"  id="sucRec"></div>

  <div class="field">
    <label class="label">E-mail</label>
    <input type="email" id="recEmail" placeholder="seu@email.com"/>
  </div>

  <button class="btn" id="btnRec" onclick="enviarRecuperacao()">Enviar link de recuperação</button>
  <a class="back" onclick="showLogin()">← Voltar ao login</a>

  <div class="footer">Desenvolvido pela <strong>SmartData</strong> Consultoria</div>
</div>

<script>
// ── CONFIG ──────────────────────────────────────────────
var SB_URL  = 'https://rbahvyejqybajnufftio.supabase.co';
var SB_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJiYWh2eWVqcXliYWpudWZmdGlvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwNjA5MjIsImV4cCI6MjA4OTYzNjkyMn0.nUIo2CT3o41YL1TT8Hrp5kq-_ZS-bMMf-gvUMCEyYMw';

var perfilAtual = 'sindico';

function setPerfil(p, idx){
  perfilAtual = p;
  [0,1,2].forEach(function(i){ document.getElementById('p'+i).classList.toggle('on', i===idx); });
}

function toggleSenha(){
  var i = document.getElementById('senha');
  i.type = i.type==='password' ? 'text' : 'password';
}

function showRecovery(){ document.getElementById('cardLogin').style.display='none'; document.getElementById('cardRecovery').style.display=''; }
function showLogin(){ document.getElementById('cardRecovery').style.display='none'; document.getElementById('cardLogin').style.display=''; }

function showErr(id, msg){ var e=document.getElementById(id); e.textContent=msg; e.style.display='block'; }
function hideErr(id){ document.getElementById(id).style.display='none'; }

document.getElementById('senha').addEventListener('keydown', function(e){ if(e.key==='Enter') fazerLogin(); });

// ── LOGIN via REST puro ──────────────────────────────────
async function fazerLogin(){
  var email = document.getElementById('email').value.trim();
  var senha = document.getElementById('senha').value;
  var btn   = document.getElementById('btnLogin');

  hideErr('errLogin');
  if(!email||!senha){ showErr('errLogin','Preencha e-mail e senha.'); return; }

  btn.disabled = true;
  btn.textContent = 'Entrando…';

  try {
    var res = await fetch(SB_URL + '/auth/v1/token?grant_type=password', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'apikey': SB_ANON
      },
      body: JSON.stringify({ email: email, password: senha })
    });

    var data = await res.json();

    if(!res.ok || !data.access_token){
      showErr('errLogin', 'E-mail ou senha inválidos.');
      btn.disabled = false;
      btn.textContent = 'Entrar no portal';
      return;
    }

    // Salva sessão no localStorage manualmente
    var sessao = {
      access_token:  data.access_token,
      refresh_token: data.refresh_token,
      expires_at:    Math.floor(Date.now()/1000) + data.expires_in,
      token_type:    'bearer',
      user:          data.user
    };
    localStorage.setItem('mandala_session', JSON.stringify(sessao));
    sessionStorage.setItem('mandala_perfil', perfilAtual);

    btn.textContent = 'Redirecionando…';
    setTimeout(function(){ window.location.href = 'dashboard.html'; }, 300);

  } catch(e) {
    showErr('errLogin', 'Erro de conexão. Tente novamente.');
    btn.disabled = false;
    btn.textContent = 'Entrar no portal';
  }
}

// ── RECUPERAR SENHA ──────────────────────────────────────
async function enviarRecuperacao(){
  var email = document.getElementById('recEmail').value.trim();
  var btn   = document.getElementById('btnRec');

  hideErr('errRec');
  document.getElementById('sucRec').style.display='none';
  if(!email){ showErr('errRec','Informe seu e-mail.'); return; }

  btn.disabled=true; btn.textContent='Enviando…';

  try {
    await fetch(SB_URL+'/auth/v1/recover', {
      method:'POST',
      headers:{'Content-Type':'application/json','apikey':SB_ANON},
      body: JSON.stringify({ email: email })
    });
    document.getElementById('sucRec').textContent='Link enviado! Verifique sua caixa de entrada.';
    document.getElementById('sucRec').style.display='block';
  } catch(e){
    showErr('errRec','Erro ao enviar. Tente novamente.');
  }

  btn.disabled=false; btn.textContent='Enviar link de recuperação';
}

// ── VERIFICA SE JÁ ESTÁ LOGADO ───────────────────────────
(function(){
  try {
    var s = localStorage.getItem('mandala_session');
    if(s){
      var sess = JSON.parse(s);
      if(sess && sess.access_token && sess.expires_at > Math.floor(Date.now()/1000)){
        window.location.href = 'dashboard.html';
      }
    }
  } catch(e){}
})();
</script>
</body>
</html>

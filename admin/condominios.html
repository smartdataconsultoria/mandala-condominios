<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CondoGestor — Condomínios</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --navy:       #0B1F3A;
    --navy-light: #142D52;
    --gold:       #E8A320;
    --gold-light: #F5C35A;
    --white:      #FFFFFF;
    --off-white:  #F7F6F2;
    --border:     #E2E8F0;
    --text-dark:  #0B1F3A;
    --text-mid:   #445571;
    --text-light: #8899B4;
    --green:      #16A34A;
    --green-bg:   #DCFCE7;
    --red:        #DC2626;
    --red-bg:     #FEF2F2;
    --amber:      #D97706;
    --amber-bg:   #FEF3C7;
    --sidebar-w:  240px;
    --radius:     12px;
    --transition: 0.2s cubic-bezier(0.4,0,0.2,1);
  }
  body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--off-white); color: var(--text-dark); display: flex; min-height: 100vh; }

  /* SIDEBAR */
  .sidebar { width: var(--sidebar-w); background: var(--navy); display: flex; flex-direction: column; position: fixed; top: 0; left: 0; bottom: 0; z-index: 50; overflow-y: auto; }
  .sidebar-logo { display: flex; align-items: center; gap: 10px; padding: 1.5rem 1.25rem 1.25rem; text-decoration: none; border-bottom: 1px solid rgba(255,255,255,0.08); margin-bottom: 0.5rem; }
  .logo-icon { width: 34px; height: 34px; background: var(--gold); border-radius: 8px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .logo-icon svg { width: 18px; height: 18px; }
  .logo-name { font-size: 1.05rem; font-weight: 800; color: var(--white); letter-spacing: -0.3px; }
  .logo-name span { color: var(--gold); }
  .sidebar-section { padding: 0 0.75rem; margin-bottom: 0.25rem; }
  .sidebar-section-label { font-size: 0.68rem; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: rgba(255,255,255,0.3); padding: 0.75rem 0.5rem 0.4rem; }
  .nav-item { display: flex; align-items: center; gap: 10px; padding: 9px 12px; border-radius: 8px; text-decoration: none; font-size: 0.85rem; font-weight: 500; color: rgba(255,255,255,0.6); transition: all var(--transition); margin-bottom: 2px; cursor: pointer; border: none; background: none; width: 100%; text-align: left; font-family: inherit; }
  .nav-item svg { width: 16px; height: 16px; flex-shrink: 0; opacity: 0.7; }
  .nav-item:hover { background: rgba(255,255,255,0.07); color: var(--white); }
  .nav-item.active { background: rgba(232,163,32,0.15); color: var(--gold-light); }
  .nav-item.active svg { opacity: 1; }
  .sidebar-bottom { margin-top: auto; padding: 1rem 0.75rem; border-top: 1px solid rgba(255,255,255,0.08); }
  .user-card { display: flex; align-items: center; gap: 10px; padding: 8px 10px; border-radius: 8px; background: rgba(255,255,255,0.06); }
  .user-avatar { width: 32px; height: 32px; border-radius: 50%; background: var(--gold); display: flex; align-items: center; justify-content: center; font-size: 0.75rem; font-weight: 700; color: var(--navy); flex-shrink: 0; }
  .user-name { font-size: 0.82rem; font-weight: 600; color: var(--white); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 130px; }
  .user-role { font-size: 0.7rem; color: rgba(255,255,255,0.4); }
  .logout-btn { margin-left: auto; background: none; border: none; cursor: pointer; padding: 4px; color: rgba(255,255,255,0.4); transition: color var(--transition); flex-shrink: 0; }
  .logout-btn:hover { color: var(--white); }
  .logout-btn svg { width: 15px; height: 15px; }

  /* MAIN */
  .main { margin-left: var(--sidebar-w); flex: 1; display: flex; flex-direction: column; min-height: 100vh; }
  .topbar { background: var(--white); border-bottom: 1px solid var(--border); padding: 0 2rem; height: 60px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 40; }
  .topbar-left h1 { font-size: 1rem; font-weight: 700; color: var(--navy); }
  .topbar-left p { font-size: 0.75rem; color: var(--text-light); }
  .topbar-right { display: flex; align-items: center; gap: 10px; }
  .btn-sm { display: flex; align-items: center; gap: 6px; padding: 7px 14px; border-radius: 8px; font-family: inherit; font-size: 0.82rem; font-weight: 600; cursor: pointer; transition: all var(--transition); text-decoration: none; border: none; }
  .btn-sm svg { width: 14px; height: 14px; }
  .btn-primary-sm { background: var(--navy); color: var(--white); }
  .btn-primary-sm:hover { background: var(--navy-light); }
  .btn-ghost-sm { background: var(--off-white); color: var(--text-mid); border: 1px solid var(--border); }
  .btn-ghost-sm:hover { background: var(--border); }
  .btn-danger-sm { background: var(--red-bg); color: var(--red); border: 1px solid #FECACA; }
  .btn-danger-sm:hover { background: #FECACA; }
  .content { padding: 1.75rem 2rem; flex: 1; }

  /* FILTROS */
  .filters { display: flex; align-items: center; gap: 10px; margin-bottom: 1.25rem; flex-wrap: wrap; }
  .search-box { display: flex; align-items: center; gap: 8px; background: var(--white); border: 1px solid var(--border); border-radius: 8px; padding: 0 12px; height: 38px; flex: 1; max-width: 320px; transition: border-color var(--transition); }
  .search-box:focus-within { border-color: var(--navy); }
  .search-box svg { width: 15px; height: 15px; color: var(--text-light); flex-shrink: 0; }
  .search-box input { border: none; outline: none; font-family: inherit; font-size: 0.85rem; color: var(--text-dark); background: transparent; width: 100%; }
  .search-box input::placeholder { color: var(--text-light); }
  .filter-select { height: 38px; padding: 0 12px; border: 1px solid var(--border); border-radius: 8px; font-family: inherit; font-size: 0.82rem; color: var(--text-mid); background: var(--white); cursor: pointer; outline: none; }
  .filter-select:focus { border-color: var(--navy); }
  .results-count { font-size: 0.8rem; color: var(--text-light); margin-left: auto; }

  /* GRID DE CARDS */
  .condos-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 1rem; }
  .condo-card { background: var(--white); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; transition: all var(--transition); }
  .condo-card:hover { box-shadow: 0 4px 20px rgba(11,31,58,0.1); transform: translateY(-2px); border-color: transparent; }
  .condo-card-header { padding: 1.25rem 1.25rem 1rem; display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; }
  .condo-card-icon { width: 42px; height: 42px; border-radius: 10px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 1.1rem; font-weight: 800; color: var(--white); }
  .condo-card-title { font-size: 0.95rem; font-weight: 700; color: var(--navy); margin-bottom: 3px; line-height: 1.3; }
  .condo-card-sub { font-size: 0.78rem; color: var(--text-light); }
  .badge { display: inline-flex; align-items: center; padding: 3px 9px; border-radius: 20px; font-size: 0.72rem; font-weight: 600; }
  .badge-green { background: var(--green-bg); color: var(--green); }
  .badge-red   { background: var(--red-bg);   color: var(--red);   }
  .badge-amber { background: var(--amber-bg); color: var(--amber); }
  .condo-card-stats { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 0; border-top: 1px solid var(--border); }
  .stat-item { padding: 10px 0; text-align: center; border-right: 1px solid var(--border); }
  .stat-item:last-child { border-right: none; }
  .stat-val { font-size: 1.1rem; font-weight: 800; color: var(--navy); line-height: 1; }
  .stat-lbl { font-size: 0.68rem; color: var(--text-light); margin-top: 2px; text-transform: uppercase; letter-spacing: 0.3px; }
  .condo-card-actions { display: flex; gap: 6px; padding: 10px 1.25rem; border-top: 1px solid var(--border); background: var(--off-white); }

  /* EMPTY STATE */
  .empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 4rem 2rem; gap: 1rem; text-align: center; }
  .empty-icon { width: 64px; height: 64px; background: var(--border); border-radius: 16px; display: flex; align-items: center; justify-content: center; }
  .empty-icon svg { width: 28px; height: 28px; color: var(--text-light); }
  .empty-state h3 { font-size: 1rem; font-weight: 700; color: var(--navy); }
  .empty-state p { font-size: 0.85rem; color: var(--text-light); max-width: 280px; line-height: 1.6; }

  /* MODAL */
  .modal-overlay { position: fixed; inset: 0; background: rgba(11,31,58,0.5); z-index: 100; display: flex; align-items: center; justify-content: center; padding: 1rem; opacity: 0; pointer-events: none; transition: opacity var(--transition); }
  .modal-overlay.open { opacity: 1; pointer-events: all; }
  .modal { background: var(--white); border-radius: 16px; width: 100%; max-width: 520px; max-height: 90vh; overflow-y: auto; transform: translateY(16px); transition: transform var(--transition); }
  .modal-overlay.open .modal { transform: translateY(0); }
  .modal-header { display: flex; align-items: center; justify-content: space-between; padding: 1.25rem 1.5rem; border-bottom: 1px solid var(--border); }
  .modal-title { font-size: 1rem; font-weight: 700; color: var(--navy); }
  .modal-close { background: none; border: none; cursor: pointer; padding: 4px; color: var(--text-light); border-radius: 6px; transition: all var(--transition); }
  .modal-close:hover { background: var(--off-white); color: var(--navy); }
  .modal-close svg { width: 18px; height: 18px; }
  .modal-body { padding: 1.5rem; }
  .modal-footer { display: flex; gap: 8px; justify-content: flex-end; padding: 1rem 1.5rem; border-top: 1px solid var(--border); }

  /* FORM */
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
  .form-grid.full { grid-template-columns: 1fr; }
  .field { display: flex; flex-direction: column; gap: 5px; }
  .field.span2 { grid-column: span 2; }
  .field label { font-size: 0.8rem; font-weight: 600; color: var(--navy); }
  .field input, .field select { height: 40px; padding: 0 12px; border: 1.5px solid var(--border); border-radius: 8px; font-family: inherit; font-size: 0.875rem; color: var(--text-dark); background: var(--white); outline: none; transition: border-color var(--transition); }
  .field input:focus, .field select:focus { border-color: var(--navy); }
  .field input::placeholder { color: var(--text-light); }
  .field-hint { font-size: 0.72rem; color: var(--text-light); }

  .btn-full { width: 100%; height: 42px; border-radius: 8px; font-family: inherit; font-size: 0.9rem; font-weight: 700; cursor: pointer; border: none; transition: all var(--transition); display: flex; align-items: center; justify-content: center; gap: 8px; }
  .btn-navy { background: var(--navy); color: var(--white); }
  .btn-navy:hover { background: var(--navy-light); }
  .btn-navy:disabled { opacity: 0.6; cursor: not-allowed; }

  /* TOAST */
  .toast { position: fixed; bottom: 1.5rem; right: 1.5rem; background: var(--navy); color: var(--white); padding: 12px 18px; border-radius: 10px; font-size: 0.85rem; font-weight: 500; z-index: 200; transform: translateY(80px); opacity: 0; transition: all 0.3s ease; display: flex; align-items: center; gap: 8px; }
  .toast.show { transform: translateY(0); opacity: 1; }
  .toast.success { background: var(--green); }
  .toast.error { background: var(--red); }
  .toast svg { width: 16px; height: 16px; flex-shrink: 0; }

  /* SPINNER */
  .spinner { width: 15px; height: 15px; border: 2px solid rgba(255,255,255,0.3); border-top-color: white; border-radius: 50%; animation: spin 0.7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  @media (max-width: 700px) { .sidebar { transform: translateX(-100%); } .main { margin-left: 0; } .form-grid { grid-template-columns: 1fr; } .field.span2 { grid-column: span 1; } }
</style>
</head>

<!-- MAIN -->

      <p id="subtitulo-topbar">Carregando...</p>
    </div>
    <div class="topbar-right">

        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>

<!-- MODAL NOVO / EDITAR -->
<div class="modal-overlay" id="modal-overlay" onclick="fecharModalFora(event)">

        </div>

          <label>CNPJ</label>

</div>

<script type="module">
  import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'
  const supabase = createClient(
    'https://siczyohqmlrmirqgzlxb.supabase.co',
    'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNpY3p5b2hxbWxybWlycWd6bHhiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc2NjE0MDksImV4cCI6MjA5MzIzNzQwOX0.JOf-VagxjdKNmC9MGU6MP6NvO6b1EBhzXirUdsjWYOw'
  )

  // ── Auth ────────────────────────────────────────────────
  const { data: { session } } = await supabase.auth.getSession()
  if (!session) { window.location.href = '/login'; throw new Error() }

  const { data: perfil } = await supabase
    .from('usuarios').select('nome, role, administradora_id')
    .eq('id', session.user.id).single()

  if (!perfil || perfil.role !== 'administradora') {
    const d = { sindico: '/sindico', morador: '/morador' }
    window.location.href = d[perfil?.role] || '/login'
    throw new Error()
  }

  const adminId = perfil.administradora_id
  document.getElementById('user-name').textContent = perfil.nome || session.user.email
  const iniciais = (perfil.nome || session.user.email).split(' ').slice(0,2).map(p=>p[0].toUpperCase()).join('')
  document.getElementById('avatar-initials').textContent = iniciais

  window.fazerLogout = async () => { await supabase.auth.signOut(); window.location.href = '/login' }

  // ── Estado ──────────────────────────────────────────────
  let condominios = []
  let editandoId  = null
  const cores = ['#2563EB','#16A34A','#D97706','#9333EA','#DC2626','#0891B2','#059669','#7C3AED']

  // ── Carregar ────────────────────────────────────────────
  async function carregar() {
    const { data, error } = await supabase
      .from('condominios')
      .select('*')
      .eq('administradora_id', adminId)
      .order('nome')

    if (error) { mostrarToast('Erro ao carregar condomínios', 'error'); return }

    condominios = data || []
    renderizar(condominios)

    const total  = condominios.length
    const ativos = condominios.filter(c => c.ativo).length
    document.getElementById('subtitulo-topbar').textContent =
      total === 0 ? 'Nenhum condomínio cadastrado'
                  : `${total} condomínio${total !== 1 ? 's' : ''} · ${ativos} ativo${ativos !== 1 ? 's' : ''}`
  }

  // ── Renderizar ──────────────────────────────────────────
  function renderizar(lista) {
    const grid = document.getElementById('condos-grid')
    document.getElementById('results-count').textContent =
      lista.length === condominios.length
        ? `${lista.length} condomínio${lista.length !== 1 ? 's' : ''}`
        : `${lista.length} de ${condominios.length}`

    if (lista.length === 0) {
      grid.innerHTML = `<div style="grid-column:1/-1">
        <div class="empty-state">
          <div class="empty-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"/></svg>
          </div>
          <h3>Nenhum condomínio encontrado</h3>
          <p>Cadastre o primeiro condomínio clicando em "Novo condomínio".</p>
        </div>
      </div>`
      return
    }

    grid.innerHTML = lista.map((c, i) => {
      const cor   = cores[i % cores.length]
      const letra = c.nome.charAt(0).toUpperCase()
      return `
      <div class="condo-card">
        <div class="condo-card-header">
          <div style="display:flex;align-items:flex-start;gap:12px;flex:1;min-width:0">
            <div class="condo-card-icon" style="background:${cor}">${letra}</div>
            <div style="min-width:0">
              <div class="condo-card-title">${c.nome}</div>
              <div class="condo-card-sub">${c.cidade && c.estado ? c.cidade+' · '+c.estado : c.cnpj || 'Sem endereço'}</div>
            </div>
          </div>
          <span class="badge ${c.ativo ? 'badge-green' : 'badge-red'}">${c.ativo ? 'Ativo' : 'Inativo'}</span>
        </div>
        <div class="condo-card-stats">
          <div class="stat-item">
            <div class="stat-val">${c.total_unidades}</div>
            <div class="stat-lbl">Unidades</div>
          </div>
          <div class="stat-item">
            <div class="stat-val" id="sindicos-${c.id}">—</div>
            <div class="stat-lbl">Síndicos</div>
          </div>
          <div class="stat-item">
            <div class="stat-val" id="moradores-${c.id}">—</div>
            <div class="stat-lbl">Moradores</div>
          </div>
        </div>
        <div class="condo-card-actions">
          <button class="btn-sm btn-ghost-sm" style="flex:1;justify-content:center" onclick="editarCondo('${c.id}')">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
            Editar
          </button>
          <button class="btn-sm btn-ghost-sm" style="flex:1;justify-content:center" onclick="toggleAtivo('${c.id}', ${c.ativo})">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/>${c.ativo ? '<line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/>' : '<polyline points="20 6 9 17 4 12"/>'}</svg>
            ${c.ativo ? 'Desativar' : 'Ativar'}
          </button>
        </div>
      </div>`
    }).join('')

    // Busca contagem de usuários por condomínio em paralelo
    lista.forEach(c => carregarContagem(c.id))
  }

  async function carregarContagem(condoId) {
    const { data } = await supabase
      .from('usuarios').select('role')
      .eq('condominio_id', condoId)

    const sindicos  = data?.filter(u => u.role === 'sindico').length  ?? 0
    const moradores = data?.filter(u => u.role === 'morador').length  ?? 0

    const elS = document.getElementById(`sindicos-${condoId}`)
    const elM = document.getElementById(`moradores-${condoId}`)
    if (elS) elS.textContent = sindicos
    if (elM) elM.textContent = moradores
  }

  // ── Filtrar ─────────────────────────────────────────────
  window.filtrar = function() {
    const busca  = document.getElementById('busca').value.toLowerCase()
    const status = document.getElementById('filtro-status').value
    const lista  = condominios.filter(c => {
      const matchNome   = c.nome.toLowerCase().includes(busca)
      const matchStatus = status === 'todos' || (status === 'ativo' ? c.ativo : !c.ativo)
      return matchNome && matchStatus
    })
    renderizar(lista)
  }

  // ── Modal ───────────────────────────────────────────────
  window.abrirModal = function(id = null) {
    editandoId = id
    document.getElementById('modal-titulo').textContent = id ? 'Editar condomínio' : 'Novo condomínio'

    if (id) {
      const c = condominios.find(x => x.id === id)
      document.getElementById('f-nome').value     = c.nome || ''
      document.getElementById('f-cnpj').value     = c.cnpj || ''
      document.getElementById('f-unidades').value = c.total_unidades || ''
      document.getElementById('f-endereco').value = c.endereco || ''
      document.getElementById('f-cidade').value   = c.cidade || ''
      document.getElementById('f-estado').value   = c.estado || ''
      document.getElementById('f-cep').value      = c.cep || ''
      document.getElementById('f-status').value   = String(c.ativo)
    } else {
      document.getElementById('f-nome').value     = ''
      document.getElementById('f-cnpj').value     = ''
      document.getElementById('f-unidades').value = ''
      document.getElementById('f-endereco').value = ''
      document.getElementById('f-cidade').value   = ''
      document.getElementById('f-estado').value   = ''
      document.getElementById('f-cep').value      = ''
      document.getElementById('f-status').value   = 'true'
    }

    document.getElementById('modal-overlay').classList.add('open')
    setTimeout(() => document.getElementById('f-nome').focus(), 100)
  }

  window.fecharModal = function() {
    document.getElementById('modal-overlay').classList.remove('open')
    editandoId = null
  }

  window.fecharModalFora = function(e) {
    if (e.target === document.getElementById('modal-overlay')) fecharModal()
  }

  window.editarCondo = function(id) { abrirModal(id) }

  // ── Salvar ──────────────────────────────────────────────
  window.salvar = async function() {
    const nome = document.getElementById('f-nome').value.trim()
    if (!nome) { document.getElementById('f-nome').focus(); return }

    const btn = document.getElementById('btn-salvar')
    btn.disabled = true
    btn.innerHTML = '<div class="spinner"></div> Salvando...'

    const dados = {
      nome,
      cnpj:            document.getElementById('f-cnpj').value.trim() || null,
      total_unidades:  parseInt(document.getElementById('f-unidades').value) || 0,
      endereco:        document.getElementById('f-endereco').value.trim() || null,
      cidade:          document.getElementById('f-cidade').value.trim() || null,
      estado:          document.getElementById('f-estado').value || null,
      cep:             document.getElementById('f-cep').value.trim() || null,
      ativo:           document.getElementById('f-status').value === 'true',
      administradora_id: adminId,
    }

    let error
    if (editandoId) {
      ;({ error } = await supabase.from('condominios').update(dados).eq('id', editandoId))
    } else {
      ;({ error } = await supabase.from('condominios').insert(dados))
    }

    btn.disabled = false
    btn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg> Salvar`

    if (error) {
      mostrarToast('Erro ao salvar: ' + error.message, 'error')
      return
    }

    fecharModal()
    mostrarToast(editandoId ? 'Condomínio atualizado!' : 'Condomínio cadastrado!', 'success')
    await carregar()
  }

  // ── Toggle ativo ────────────────────────────────────────
  window.toggleAtivo = async function(id, atual) {
    const { error } = await supabase
      .from('condominios').update({ ativo: !atual }).eq('id', id)
    if (error) { mostrarToast('Erro ao atualizar status', 'error'); return }
    mostrarToast(atual ? 'Condomínio desativado' : 'Condomínio ativado!', 'success')
    await carregar()
  }

  // ── Toast ───────────────────────────────────────────────
  function mostrarToast(msg, tipo = 'success') {
    const t = document.getElementById('toast')
    document.getElementById('toast-msg').textContent = msg
    t.className = `toast ${tipo} show`
    setTimeout(() => t.classList.remove('show'), 3000)
  }

  // ── Init ────────────────────────────────────────────────
  await carregar()
</script>

</body>
</html>
